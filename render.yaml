services:
  - type: web
    name: sala-tpv
    runtime: python
    plan: free
    buildCommand: bash ./build.sh
    startCommand: uv run gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: INFO